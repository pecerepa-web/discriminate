<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Discriminate · Minimal Pairs</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e2a3a 0%, #0f1724 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            width: 100%;
            background: white;
            border-radius: 48px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #2c3e50, #1e2a3a);
            color: white;
            padding: 24px;
            text-align: center;
        }
        .header h1 { font-size: 1.5rem; }
        .badge {
            display: inline-block;
            background: #eab308;
            color: #1e2a3a;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: bold;
            margin-top: 8px;
        }
        .drill-panel { padding: 24px; }
        .card {
            background: #f8fafc;
            border-radius: 32px;
            padding: 28px;
            margin-bottom: 20px;
            text-align: center;
        }
        .options {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .option-btn {
            background: #e2e8f0;
            border: 3px solid #cbd5e1;
            padding: 20px 30px;
            font-size: 1.8rem;
            font-weight: bold;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.2s;
            min-width: 120px;
            font-family: monospace;
        }
        .option-btn:active { transform: scale(0.96); }
        .status {
            background: #eef2ff;
            padding: 16px;
            border-radius: 60px;
            margin: 20px 0;
            text-align: center;
            font-weight: bold;
        }
        .status-correct { background: #dcfce7; color: #166534; }
        .status-wrong { background: #fee2e2; color: #991b1b; }
        .status-waiting { background: #fef3c7; color: #92400e; }
        .score-area {
            text-align: center;
            margin-top: 20px;
            padding: 16px;
            background: #f1f5f9;
            border-radius: 32px;
            font-weight: bold;
        }
        .progress { text-align: center; margin-top: 15px; font-weight: bold; color: #2c3e50; }
        .start-btn {
            background: #16a34a;
            color: white;
            padding: 14px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            margin: 10px auto;
            display: block;
            width: 80%;
        }
        .start-btn:hover { background: #15803d; }
        .touch-hint {
            text-align: center;
            margin-top: 10px;
            font-size: 0.8rem;
            color: #2c3e50;
            background: #e2e8f0;
            padding: 8px;
            border-radius: 30px;
        }
        @media (max-width: 600px) {
            .option-btn { padding: 15px 20px; font-size: 1.5rem; min-width: 90px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🎧 Discriminate · Minimal Pairs</h1>
        <div class="badge">👆 Toca el número de la palabra que escuchas</div>
    </div>

    <div class="drill-panel">
        <div class="card">
            <div class="options">
                <button class="option-btn" data-num="1">1<br><span id="opt1">---</span></button>
                <button class="option-btn" data-num="2">2<br><span id="opt2">---</span></button>
                <button class="option-btn" data-num="3">3<br><span id="opt3">---</span></button>
            </div>
        </div>

        <button id="startBtn" class="start-btn">🎙️ COMENZAR</button>

        <div class="status" id="status">✅ Presiona COMENZAR</div>

        <div class="score-area">
            🎯 Aciertos: <span id="score">0</span> / <span id="total">0</span>
        </div>
        <div class="progress" id="progress">Palabra 1 de 47</div>
        <div class="touch-hint">👆 Escucha la palabra y toca el número correcto</div>
    </div>
</div>

<script>
  const questions = [
    { audio: "audio/cheat.mp3", options: ["cheat", "sheet", "seat"], correct: 1 },
    { audio: "audio/price.mp3", options: ["price", "peace", "prize"], correct: 1 },
    { audio: "audio/peace.mp3", options: ["price", "peace", "piece"], correct: 2 },
    { audio: "audio/phase.mp3", options: ["phase", "face", "vase"], correct: 1 },
    { audio: "audio/vase.mp3", options: ["phase", "vase", "face"], correct: 2 },
    { audio: "audio/fine.mp3", options: ["fine", "vine", "find"], correct: 1 },
    { audio: "audio/vine.mp3", options: ["fine", "vine", "wine"], correct: 2 },
    { audio: "audio/choke.mp3", options: ["choke", "joke", "soak"], correct: 1 },
    { audio: "audio/joke.mp3", options: ["choke", "joke", "yolk"], correct: 2 },
    { audio: "audio/batch.mp3", options: ["batch", "beach", "bitch"], correct: 1 },
    { audio: "audio/beach.mp3", options: ["batch", "beach", "bitch"], correct: 2 },
    { audio: "audio/pitch.mp3", options: ["pitch", "peach", "patch"], correct: 1 },
    { audio: "audio/peach.mp3", options: ["pitch", "peach", "beach"], correct: 2 },
    { audio: "audio/cart.mp3", options: ["cart", "court", "heart"], correct: 1 },
    { audio: "audio/court.mp3", options: ["cart", "court", "coat"], correct: 2 },
    { audio: "audio/heart.mp3", options: ["heart", "hurt", "hard"], correct: 1 },
    { audio: "audio/hurt.mp3", options: ["heart", "hurt", "hut"], correct: 2 },
    { audio: "audio/firm.mp3", options: ["firm", "form", "farm"], correct: 1 },
    { audio: "audio/form.mp3", options: ["firm", "form", "from"], correct: 2 },
    { audio: "audio/verse.mp3", options: ["verse", "worse", "voice"], correct: 1 },
    { audio: "audio/worse.mp3", options: ["verse", "worse", "worth"], correct: 2 },
    { audio: "audio/lease.mp3", options: ["lease", "list", "least"], correct: 1 },
    { audio: "audio/list.mp3", options: ["lease", "list", "lost"], correct: 2 },
    { audio: "audio/bin.mp3", options: ["bin", "bean", "been"], correct: 1 },
    { audio: "audio/bean.mp3", options: ["bin", "bean", "ban"], correct: 2 },
    { audio: "audio/fill.mp3", options: ["fill", "feel", "fail"], correct: 1 },
    { audio: "audio/feel.mp3", options: ["fill", "feel", "fall"], correct: 2 },
    { audio: "audio/bet.mp3", options: ["bet", "bat", "bit"], correct: 1 },
    { audio: "audio/bat.mp3", options: ["bet", "bat", "but"], correct: 2 },
    { audio: "audio/met.mp3", options: ["met", "mat", "mate"], correct: 1 },
    { audio: "audio/mat.mp3", options: ["met", "mat", "mut"], correct: 2 },
    { audio: "audio/ten.mp3", options: ["ten", "tan", "tin"], correct: 1 },
    { audio: "audio/tan.mp3", options: ["ten", "tan", "ton"], correct: 2 },
    { audio: "audio/dead.mp3", options: ["dead", "dad", "did"], correct: 1 },
    { audio: "audio/dad.mp3", options: ["dead", "dad", "dud"], correct: 2 },
    { audio: "audio/guess.mp3", options: ["guess", "gas", "guss"], correct: 1 },
    { audio: "audio/gas.mp3", options: ["guess", "gas", "gus"], correct: 2 },
    { audio: "audio/cup.mp3", options: ["cup", "cap", "carp"], correct: 1 },
    { audio: "audio/carp.mp3", options: ["cup", "carp", "crap"], correct: 2 },
    { audio: "audio/luck.mp3", options: ["luck", "lark", "lack"], correct: 1 },
    { audio: "audio/lark.mp3", options: ["luck", "lark", "lock"], correct: 2 },
    { audio: "audio/cut.mp3", options: ["cut", "cart", "cat"], correct: 1 },
    { audio: "audio/hut.mp3", options: ["hut", "heart", "hat"], correct: 1 },
    { audio: "audio/bug.mp3", options: ["bug", "bog", "bag"], correct: 1 },
    { audio: "audio/bog.mp3", options: ["bug", "bog", "bag"], correct: 2 },
    { audio: "audio/duck.mp3", options: ["duck", "dark", "dock"], correct: 1 },
    { audio: "audio/dark.mp3", options: ["duck", "dark", "dork"], correct: 2 }
];

    let currentIndex = 0;
    let score = 0;
    let totalAnswered = 0;
    let currentQuestion = null;
    let audioPlayer = null;
    let autoNextTimeout = null;
    let isRunning = false;
    let waitingForAnswer = false;

    const opt1 = document.getElementById('opt1');
    const opt2 = document.getElementById('opt2');
    const opt3 = document.getElementById('opt3');
    const statusDiv = document.getElementById('status');
    const scoreSpan = document.getElementById('score');
    const totalSpan = document.getElementById('total');
    const progressSpan = document.getElementById('progress');
    const startBtn = document.getElementById('startBtn');
    const optionBtns = document.querySelectorAll('.option-btn');

    function loadQuestion() {
        if (currentIndex >= questions.length) {
            statusDiv.innerHTML = `🎉 ¡COMPLETADO! Puntaje final: ${score}/${totalAnswered}`;
            statusDiv.className = 'status status-correct';
            isRunning = false;
            return;
        }
        
        currentQuestion = questions[currentIndex];
        opt1.textContent = currentQuestion.options[0];
        opt2.textContent = currentQuestion.options[1];
        opt3.textContent = currentQuestion.options[2];
        progressSpan.textContent = `Palabra ${currentIndex + 1} de ${questions.length}`;
        totalSpan.textContent = questions.length;
        
        statusDiv.innerHTML = '🔊 Reproduciendo palabra...';
        statusDiv.className = 'status status-waiting';
        waitingForAnswer = false;
        
        playAudio();
    }

    function playAudio() {
        if (audioPlayer) {
            audioPlayer.pause();
            audioPlayer = null;
        }
        audioPlayer = new Audio(currentQuestion.audio);
        audioPlayer.play().then(() => {
            statusDiv.innerHTML = '🎧 ¿Cuál es? Toca el número';
            statusDiv.className = 'status';
            waitingForAnswer = true;
        }).catch(e => {
            statusDiv.innerHTML = `❌ Error con audio: ${currentQuestion.audio}`;
            statusDiv.className = 'status status-wrong';
        });
    }

    function processAnswer(selectedNumber) {
        if (!waitingForAnswer) return;
        if (!currentQuestion) return;
        
        waitingForAnswer = false;
        totalAnswered++;
        const isCorrect = (selectedNumber === currentQuestion.correct);
        
        if (isCorrect) {
            score++;
            statusDiv.innerHTML = `✅ ¡Correcto! "${currentQuestion.options[currentQuestion.correct - 1]}" → +1`;
            statusDiv.className = 'status status-correct';
        } else {
            statusDiv.innerHTML = `❌ Incorrecto. Era "${currentQuestion.options[currentQuestion.correct - 1]}"`;
            statusDiv.className = 'status status-wrong';
        }
        
        scoreSpan.textContent = score;
        totalSpan.textContent = totalAnswered;
        
        if (autoNextTimeout) clearTimeout(autoNextTimeout);
        autoNextTimeout = setTimeout(() => {
            currentIndex++;
            loadQuestion();
        }, 1500);
    }

    function startExercise() {
        if (isRunning) return;
        isRunning = true;
        currentIndex = 0;
        score = 0;
        totalAnswered = 0;
        waitingForAnswer = false;
        startBtn.style.display = 'none';
        loadQuestion();
    }

    optionBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            const num = parseInt(btn.dataset.num);
            processAnswer(num);
        });
    });

    startBtn.onclick = startExercise;
</script>
</body>
</html>
